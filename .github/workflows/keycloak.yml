on:
  push:
    branches:
      - 'main'
    tags:
      - 'keycloak/v*'
    paths:
      - keycloak/**
      - .github/workflows/keycloak.yml

env:
  IMAGE_NAME: blockscout/keycloak

defaults:
  run:
    working-directory: keycloak

jobs:
  push:
    name: Docker build and docker push
    uses: ./.github/workflows/_docker-build-push.yml
    with:
      service-name: keycloak
